<body> <!--DOM == Document Object Model-->
    <h1>Iniciando Estudos com DOM</h1> 
        <p>Aqui vai o resultado</p>

            Clique em mim
        </div>
        <script>
            var corpo = window.document.body
            let p1 = window.document.getElementsByTagName('p')[0]
            document.write(p1.innerText)[0]
            
        </script>
</body>
