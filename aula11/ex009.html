<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Nacionalidade</title>
    <style>
        body{
            font: normal 18px arial;
            text-align: center;
            padding: 20px;
        }

    </style>
</head>
<body>
    <h1>Sistema de Nacionalidade</h1>
    País de Nascimento: <input type="text" name="count" id="count"> <br>
    <input type="button" value="Enter" onclick="enter()" id="button">
    <div id="res">

    </div>

    <script>
        function enter() {
            let country = document.getElementById('count')
            let res = document.getElementById('res')
            res.innerText = `Seu país de nascimento é ${count}`
        }
    </script>
</body>
</html>
