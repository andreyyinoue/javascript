<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    Velocidade do veículo <input type="number" name="txtvel" id="txtvel"> Km/h
    <input type="button" value="Verificar" onclick="verify()">
    <div id="res">
        
    </div>
    <script>
        function verify() {
            let txtv = window.document.getElementById('txtvel')
            let res = document.getElementById('res')
            let vel = Number(txtv.value)
            res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel} Km/h</strong> </p>`
            if (vel > 60) {
                res.innerHTML += `<p>Você foi <strong>multado</strong> por excesso de velocidade</p>`
            }
            res.innerHTML += `<p>Dirija com segurança</p>`
        }
    </script>
</body>
</html>
